name: Synchronisation Brevo - Fichier 03

on:
  schedule:
    # S'exécute automatiquement chaque nuit à 3h00 (Heure UTC)
    - cron: '0 3 * * *'
  # Permet le lancement manuel sur demande depuis l'onglet Actions sur GitHub
  workflow_dispatch:

jobs:
  run-sync-brevo:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code Python présent sur ton dépôt GitHub
      - name: Récupérer le code du dépôt GitHub
        uses: actions/checkout@v4

      # 2. Installe l'environnement Python
      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Installe les librairies nécessaires (dont gdown pour Google Drive)
      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy sib-api-v3-sdk python-dotenv gdown

      # 4. Télécharge temporairement le CSV depuis Google Drive
      - name: Télécharger le CSV depuis Google Drive
        run: |
          gdown ${{ secrets.DRIVE_FILE_ID }} -O donnees_segmentation_profonde.csv --fuzzy
          
      # 5. Exécute le script Python avec la clé API Brevo
      - name: Exécuter le script de synchronisation Brevo
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: python 03_synchronisation__brevo.py
